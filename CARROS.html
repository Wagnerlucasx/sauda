</head>

<body>

<!-- HEADER -->

<div class="container">

</div>

<nav class="nav">
<a href="index.html">HOME</a>

src="wowslider/wowslider.html"

<!-- CARROS -->

<section class="carros">

<h2>CARROS À VENDA</h2>


<div class="carro">

<img src="2photos/suzuki-alto.png" alt="Suzuki Alto">

<h3>SUZUKI ALTO</h3>

<p>Preço: 8.000.000 Kz</p>

<button>Comprar</button>

</div>


<div class="carro">

<img src="2photos/expresso.png" alt="Suzuki Expresso">

<h3>SUZUKI EXPRESSO</h3>

<p>Preço: 9.000.000 Kz</p>

<button>Comprar</button>

</div>

</section>


<!-- FORMULÁRIO VENDER CARRO -->

<section class="sell-section">

<div class="container">

<h2 class="section-title">Vender o Seu Carro</h2>


<form id="sellForm">


<div class="form-section">

<h3>Informações Pessoais</h3>

<label>Nome Completo</label>
<input type="text" placeholder="Seu nome completo" required>


<label>Email</label>
<input type="email" placeholder="Seu email" required>


<label>Telefone</label>
<input type="tel" placeholder="Seu número" required>


<label>Número de Identidade</label>
<input type="text" placeholder="Número do B.I" required>


<label>Morada</label>
<input type="text" placeholder="Sua morada" required>

</div>


<div class="form-section">

<h3>Detalhes do Veículo</h3>

<label>Modelo</label>
<input type="text" placeholder="Modelo do carro" required>


<label>Ano</label>
<input type="number" placeholder="Ano do carro" required>


<label>Quilometragem</label>
<input type="number" placeholder="Km rodados" required>


<label>Número do Chassi</label>
<input type="text" placeholder="VIN / Chassi" required>


<label>Preço</label>
<input type="text" placeholder="Preço desejado" required>


<label>Província</label>

<select required>

<option>Luanda</option>
<option>Icolo e Bengo</option>
<option>Bengo</option>

</select>

</div>


<div class="form-section">

<h3>Fotos do Carro</h3>

<input type="file" accept="image/*" multiple required>

</div>


<button class="btn-submit">Enviar para Aprovação</button>


</form>

</div>

</section>
