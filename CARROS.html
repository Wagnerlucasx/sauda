<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITEC MÓVEL-CARROS</title>
    <link rel="stylesheet" href="CARROS.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>ITEC MÓVEL</h1>
            </div>
            <nav class="nav">
                <a href="index.html">HOME</a>
                <a href="CARROS.html">CARROS</a>
                <a href="SOBRE.html">SOBRE</a>
                <a href="CONTACTOS.html">CONTACTO</a>
            </nav>
        </div>
    </header>
    <br>
     <!-- Start WOWSlider.com -->
<iframe src="wowslider/wowslider.html" style="width:1280px;height:520px;max-width:100%;overflow:hidden;border:none;padding:0;margin:0 auto;display:block;" marginheight="0" marginwidth="0"></iframe>
<!-- End WOWSlider.com -->
    <BR>
        <BR>
            <section class="carros">

                <h3>CARROS À VENDA</h3>
            
                <div class="carro">
                    <img src="2photos/suzuki alto.png" alt="Carro">
                    <h3>SUZUKI ALTO</h3>
                    <p>Preço: 8.000.000,00 Milhões Kz</p>
                    <button>Comprar</button>
                </div>
            
                <div class="carro">
                    <img src="2photos/expresso.png" alt="Carro">
                    <h3>SUZUKI EXPRESSO</h3>
                    <p>Preço: 9.000.000,00 MILHÕES Kz</p>
                    <button>Comprar</button>
                </div>
            
            </section>
                
            <section class="sell-section">
                <div class="container">
              
                  <h2 class="section-title">Vender o Seu Carro</h2>
              
                  <form id="sellForm">
              
                    <div class="form-section">
                      <h3>Informações Pessoais</h3>
              
                      <label>Nome Completo</label>
                      <input type="text" placeholder="fullName" required>
              
                      <label>Email</label>
                      <input type="email" placeholder="email" required>
              
                      <label>Telefone</label>
                      <input type="number" placeholder="Número" required>
              
                      <label>Número de Identidade</label>
                      <input type="text" placeholder="B.I" required>
              
                      <label>Morada</label>
                      <input type="text" id="address" required>
                    </div>
              
                    <div class="form-section">
                      <h3>Detalhes do Veículo</h3>
              
                      <label>Modelo</label>
                      <input type="number" placeholder="Preço" required>
              
                      <label>Ano</label>
                      <input type="number" placeholder="Ano"required>
              
                      <label>Quilometragem</label>
                      <input type="number" id="km" required>
              
                      <label>Chassi</label>
                      <input type="text" id="vin" required>
              
                      <label>Preço</label>
                      <input type="text" id="price" required>
              
                      <label>Província</label>
                      <select id="province" required>
                        <option value="Luanda">Luanda</option>
                        <option value="Luanda">ICOLO E BENGO</option>
                        <option value="Luanda">BENGO</option>
                      </select>
                    </div>
              
                    <div class="form-section">
                      <h3>Fotos do Carro</h3>
                      <input type="file" id="photos" accept="image/*" multiple required>
                    </div>
              
                    <button class="btn-submit">Enviar para Aprovação</button>
                  </form>
              
                </div>
              </section>
              
            
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ITEC MÓVEL - Todos os direitos reservados</p>
        </div>
    </footer>
</body>
</html>
